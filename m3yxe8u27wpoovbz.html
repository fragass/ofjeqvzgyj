<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="favicon.png" type="image/png">
  <script>
    if (!sessionStorage.getItem("token") || !sessionStorage.getItem("loggedUser")) {
      window.location.href = "index.html";
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página inicial - Workday</title>
</head>

<body>
<script>
const loggedUser = sessionStorage.getItem("loggedUser");


// =====================================================
// 🔔 TITLE BADGE (notificação no title)
// =====================================================
const ORIGINAL_TITLE = document.title || "Página inicial - Workday";
let unreadCount = 0;

function setTitleBadge() {
  if (unreadCount > 0) {
    document.title = `(${unreadCount}) ${ORIGINAL_TITLE}`;
  } else {
    document.title = ORIGINAL_TITLE;
  }
}

function bumpUnread(n = 1) {
  unreadCount += n;
  if (unreadCount < 0) unreadCount = 0;
  setTitleBadge();
}

function clearUnread() {
  unreadCount = 0;
  setTitleBadge();
}

window.addEventListener("focus", clearUnread);
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) clearUnread();
});


// =====================================================
// ESTADO INCREMENTAL
// =====================================================
let chatMode = "public";
let currentRoom = null;

const incState = {
  public: { lastId: 0, rendered: new Set() },
  dm:     { lastId: 0, rendered: new Set() }
};


// =====================================================
// FUNÇÕES UTILITÁRIAS
// =====================================================
function maxIdFrom(list) {
  let max = 0;
  for (const m of list) {
    const id = Number(m?.id || 0);
    if (id > max) max = id;
  }
  return max;
}


// =====================================================
// LOAD PUBLIC FULL
// =====================================================
async function loadPublicFull() {
  const res = await fetch("/api/message?recent=1&limit=200");
  const data = await res.json();
  const list = Array.isArray(data) ? data : [];

  incState.public.rendered.clear();
  list.forEach(m => incState.public.rendered.add(Number(m.id)));
  incState.public.lastId = maxIdFrom(list);

  renderPublic(list);
}


// =====================================================
// LOAD PUBLIC INCREMENTAL
// =====================================================
async function loadPublicIncremental() {
  const afterId = incState.public.lastId || 0;
  const res = await fetch(`/api/message?after_id=${afterId}&limit=200`);
  const data = await res.json();
  const list = Array.isArray(data) ? data : [];
  if (!list.length) return true;

  const newOnes = [];
  for (const m of list) {
    const id = Number(m.id);
    if (!incState.public.rendered.has(id)) {
      incState.public.rendered.add(id);
      newOnes.push(m);
    }
  }

  if (!newOnes.length) return true;

  // 🔔 Conta mensagens novas só se aba estiver escondida
  if (document.hidden) {
    const inc = newOnes.filter(m => (m?.name || "") !== loggedUser).length;
    if (inc > 0) bumpUnread(inc);
  }

  appendPublic(newOnes);

  const maxNew = maxIdFrom(newOnes);
  if (maxNew > incState.public.lastId) {
    incState.public.lastId = maxNew;
  }

  return true;
}


// =====================================================
// LOAD DM INCREMENTAL
// =====================================================
async function loadDmIncremental() {
  if (!currentRoom) return true;

  const afterId = incState.dm.lastId || 0;
  const res = await fetch(`/api/dm/messages?room=${currentRoom}&after_id=${afterId}&limit=200`);
  const data = await res.json();
  const list = Array.isArray(data) ? data : [];
  if (!list.length) return true;

  const newOnes = [];
  for (const m of list) {
    const id = Number(m.id);
    if (!incState.dm.rendered.has(id)) {
      incState.dm.rendered.add(id);
      newOnes.push(m);
    }
  }

  if (!newOnes.length) return true;

  if (document.hidden) {
    const inc = newOnes.filter(m => (m?.sender || "") !== loggedUser).length;
    if (inc > 0) bumpUnread(inc);
  }

  appendDm(newOnes);

  const maxNew = maxIdFrom(newOnes);
  if (maxNew > incState.dm.lastId) {
    incState.dm.lastId = maxNew;
  }

  return true;
}


// =====================================================
// POLLING INTELIGENTE
// =====================================================
const pollState = {
  messages: { fails: 0, timer: null }
};

function jitter(ms) {
  return ms + Math.floor(Math.random() * 500);
}

function backoffDelay(base, fails, max) {
  const capped = Math.min(fails, 6);
  const d = base * Math.pow(2, capped);
  return jitter(Math.min(d, max));
}

function baseInterval() {
  return document.hidden ? 12000 : 2500;
}

function scheduleMessages() {
  const run = async () => {
    try {
      if (chatMode === "public") {
        await loadPublicIncremental();
      } else {
        await loadDmIncremental();
      }
      pollState.messages.fails = 0;
    } catch {
      pollState.messages.fails++;
    }

    const delay = pollState.messages.fails === 0
      ? jitter(baseInterval())
      : backoffDelay(baseInterval(), pollState.messages.fails, 60000);

    pollState.messages.timer = setTimeout(run, delay);
  };

  pollState.messages.timer = setTimeout(run, 1000);
}


// =====================================================
// INIT
// =====================================================
document.addEventListener("DOMContentLoaded", async () => {
  await loadPublicFull();
  scheduleMessages();
});


// =====================================================
// RENDER PLACEHOLDERS (mantém compatível com seu sistema)
// =====================================================
function renderPublic(list) {
  console.log("Render full public:", list.length);
}

function appendPublic(list) {
  console.log("Append public:", list.length);
}

function appendDm(list) {
  console.log("Append dm:", list.length);
}

</script>
</body>
</html>

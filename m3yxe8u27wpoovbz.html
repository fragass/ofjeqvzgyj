<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" href="favicon.png" type="image/png">
    <script>
        if (!sessionStorage.getItem("token") || !sessionStorage.getItem("loggedUser")) {
            window.location.href = "index.html";
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página inicial - Workday</title>
<style>
* { box-sizing: border-box; }

html { 
    scrollbar-width: thin; 
    scrollbar-color: #2c2f36 #0b0f14; 
}
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #0b0f14; }
::-webkit-scrollbar-thumb { background: #2c2f36; border-radius: 6px; }
::-webkit-scrollbar-thumb:hover { background: #3a3d46; }

.messages::-webkit-scrollbar { width: 8px; }
.messages::-webkit-scrollbar-track { background: #10151c; }
.messages::-webkit-scrollbar-thumb { background: #2c2f36; border-radius: 6px; }
.messages::-webkit-scrollbar-thumb:hover { background: #3a3d46; }

body {
    margin: 0;
    background: #0b0f14;
    font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
    color: #e6edf3;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    padding: 10px;
}

.online-box {
    position: fixed;
    top: 10px;
    left: 10px;
    background: #151a21;
    border: 1px solid rgba(255,255,255,.08);
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 12px;
    color: #b8bcc4;
    box-shadow: 0 6px 18px rgba(0,0,0,.5);
    z-index: 1000;
}

.container {
    width: 700px;
    max-width: 100%;
    height: 700px;
    max-height: 90vh;
    background: #151a21;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,.7);
}

.header {
    padding: 16px;
    font-size: 15px;
    font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #e6edf3;
}

.warning-text { color: #ffffff; }

.admin-link {
    text-decoration: none;
    font-size: 14px;
    opacity: 0.8;
    color: #b8bcc4;
    transition: all 0.2s ease;
}
.admin-link:hover { opacity: 1; transform: scale(1.05); }

.messages {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    background: #10151c;
}

.message {
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 10px;
    background: #151a21;
    border: 1px solid rgba(255,255,255,.08);
    font-size: 13px;
    transition: background 0.2s ease, transform 0.15s ease;
}
.message:hover { background: #1b2028; transform: translateY(-1px); }

.message-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
}

.username { font-weight: 600; color: #ffffff; }
.timestamp { font-size: 11px; color: #8b949e; }

.form {
    padding: 14px;
    border-top: 1px solid rgba(255,255,255,.08);
    display: flex;
    gap: 8px;
    align-items: center;
    position: relative;
}

textarea {
    flex: 1;
    resize: none;
    height: 45px;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #3a3d46;
    background: #10151c;
    color: #e6edf3;
    font-size: 13px;
    outline: none;
    transition: border 0.2s ease, box-shadow 0.2s ease;
}
textarea:focus { border-color: #3a3d46; box-shadow: 0 0 0 2px rgba(255,255,255,.12); }

button.send-btn {
    padding: 0 18px;
    height: 45px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,.12);
    background: #10151c;
    color: #ffffff;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
}
button.send-btn:hover { background: #151a21; transform: translateY(-1px); }

/* EMOJI */
.emoji-toggle {
    cursor: pointer;
    font-size: 20px;
    opacity: 0.75;
    transition: all 0.2s ease;
}
.emoji-toggle:hover { opacity: 1; transform: scale(1.15); }

.emoji-panel {
    position: absolute;
    bottom: 65px;
    right: 90px;
    width: 260px;
    max-height: 200px;
    overflow-y: auto;
    background: #151a21;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 12px;
    display: none;
    flex-wrap: wrap;
    gap: 6px;
}
.emoji-panel span { cursor: pointer; font-size: 20px; transition: transform 0.1s ease; }
.emoji-panel span:hover { transform: scale(1.3); }

#mini-profile {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(21,26,33,0.95);
    color: #ffffff;
    font-family: Arial, sans-serif;
    font-size: 14px;
    padding: 6px 12px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,.5);
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
}
#mini-profile span { font-weight: bold; color: #fff; }

#arrow { transition: transform 0.3s ease; margin-left: 4px; }

#dropdown-menu {
    display: none;
    position: absolute;
    top: 40px;
    right: 0;
    background: rgba(21,26,33,0.95);
    border-radius: 10px;
    box-shadow: 0 6px 18px rgba(0,0,0,.6);
    padding: 8px 12px;
    z-index: 1000;
}
#dropdown-menu button {
    background: #10151c;
    color: #ffffff;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 10px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 14px;
    width: 100%;
    transition: all 0.2s ease;
}
#dropdown-menu button:hover { background: #151a21; transform: translateY(-1px); }

.online-header { display: flex; align-items: center; gap: 8px; }
.online-dot {
    width: 10px;
    height: 10px;
    background: #3fb950;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
}
@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(63,185,80,0.6); }
    70% { box-shadow: 0 0 0 8px rgba(63,185,80,0); }
    100% { box-shadow: 0 0 0 0 rgba(63,185,80,0); }
}

.mention { color: #ffffff; background: #2c2f36; font-weight: 700; padding: 2px 6px; border-radius: 6px; }
.mention-self { color: #1f2937; background: #e5e7eb; font-weight: 700; padding: 2px 6px; border-radius: 6px; }

/* SUSSURRO */
.message.whisper {
    background: #2a2538;
    border: 1px solid #6f42c1;
    color: #e5def5;
    font-style: italic;
    box-shadow: 0 0 0 1px rgba(111,66,193,0.15);
}
.message.whisper:hover { background: #332d46; }

/* Overlay de notificação */
.overlay {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #10151c;
    color: #ffffff;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,.6);
    z-index: 9999;
    transition: opacity 0.4s ease, transform 0.3s ease;
}
.overlay.success { background: #151a21; color: #ffffff; } /* Sussurro enviado com sucesso */
.overlay.error { background: #da3633; }
.overlay.info { background: #2c2c2c; }

/* RESPONSIVO */
@media (max-width: 992px) {
    .container { width: 90%; height: 80vh; }
    .emoji-panel { right: 20px; bottom: 80px; width: 240px; }
}

@media (max-width: 768px) {
    .container { height: 75vh; }
    .form { flex-direction: column; align-items: stretch; gap: 6px; }
    textarea { height: 60px; font-size: 14px; }
    button.send-btn { width: 100%; }
    .emoji-panel { width: 90%; right: 5%; bottom: 80px; }
    .header { flex-direction: column; align-items: flex-start; gap: 6px; }
}

@media (max-width: 480px) {
    body { padding: 5px; }
    .container { height: 85vh; }
    #mini-profile { font-size: 13px; padding: 4px 10px; top: 5px; right: 5px; }
    .online-box { font-size: 11px; padding: 6px 10px; top: 5px; left: 5px; }
    .warning-text { font-size: 12px; text-align: center; }
    .messages { padding: 10px; }
    textarea { height: 55px; font-size: 13px; }
}
</style>
</head>
<body>
    <div class="side-panel right-panel"></div>

    <div id="mini-profile">
        <span id="user-phone"></span>
        <svg id="arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
    </div>

    <div id="dropdown-menu">
        <button id="logout">Sair</button>
    </div>

    <audio id="messageSound" src="message.mp3" preload="auto"></audio>

    <div class="online-box">
        <div class="online-header">
            <div class="online-dot"></div>
            <span id="onlineUsers">0</span>
        </div>
    </div>

    <div class="container">
        <div class="header">
                        <span class="warning-text">Mensagens com 24 horas de envio serão apagadas todos os dias à meia-noite.</span>
            <a href="https://6bh1xntg0kegg8kp.vercel.app/" class="admin-link">🔒</a>
        </div>
        <div class="messages" id="messages"></div>
        <div class="form">
            <textarea id="content" placeholder="Escreva uma mensagem... (use CTRL + V para enviar imagens)"></textarea>
            <span class="emoji-toggle" onclick="toggleEmojis()">🙂</span>
            <button class="send-btn" onclick="sendMessage()">Enviar</button>
            <div class="emoji-panel" id="emojiPanel"></div>
        </div>
    </div>

<script>
/* 🔐 LOGGED USER — CORREÇÃO DEFINITIVA */
let loggedUserRaw = sessionStorage.getItem("loggedUser");
let loggedUser = loggedUserRaw;

try {
    const parsed = JSON.parse(loggedUserRaw);
    if (parsed && typeof parsed === "object" && parsed.name) {
        loggedUser = parsed.name;
    }
} catch {}

/* =============================== */

/* 🔔 OVERLAY FLUTUANTE (IGUAL AO DA PRINT) */
function showOverlay(message) {
    const overlay = document.createElement("div");
    overlay.className = "overlay-notification";
    overlay.textContent = message;

    document.body.appendChild(overlay);

    setTimeout(() => {
        overlay.classList.add("show");
    }, 10);

    setTimeout(() => {
        overlay.classList.remove("show");
        setTimeout(() => overlay.remove(), 300);
    }, 3000);
}

/* =============================== */

let lastMessageId = null;
let pendingImageUrl = null;
let isSending = false;

/* 🔒 DM STATE */
let currentPrivateChannel = null;
let currentPrivateUser = null;

const userColors = ["#58a6ff","#2ea043","#f0883e","#a371f7","#ff7b72","#1f6feb","#3fb950","#d29922","#bc8cff","#ffa657"];

/* UTILIDADES */
function getColorFromName(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
    }
    return userColors[Math.abs(hash) % userColors.length];
}

function escapeHTML(str) {
    return str.replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
    }[m]));
}

function highlightMentions(text) {
    const escaped = escapeHTML(text);
    return escaped.replace(/@(\w+)/g, (m, u) =>
        u === loggedUser
            ? `<span class="mention-self">@${u}</span>`
            : `<span class="mention">@${u}</span>`
    );
}

/* VISIBILIDADE */
function canUserSeeMessage(msg) {
    if (!msg.to) return true;
    return msg.to === loggedUser || msg.name === loggedUser;
}

/* EMOJIS */
function toggleEmojis() {
    const panel = document.getElementById("emojiPanel");
    panel.style.display = panel.style.display === "flex" ? "none" : "flex";
}

const emojis = ["😀","😁","😂","🤣","😃","😄","😅","😆","😉","😊","😍","🥰","😘","😎","🤔","😢","😭","😡","🔥","👍","👎","👏","🙌","💪","🎉","❤️","💔","💯","✔️","⚡"];
function loadEmojis() {
    const panel = document.getElementById("emojiPanel");
    panel.innerHTML = "";
    emojis.forEach(e => {
        const s = document.createElement("span");
        s.textContent = e;
        s.onclick = () => {
            const t = document.getElementById("content");
            t.value += e;
            t.focus();
        };
        panel.appendChild(s);
    });
}
loadEmojis();

/* ================= PRIVATE MESSAGES ================= */

async function loadPrivateMessages() {
    if (!currentPrivateChannel) return;

    try {
        const res = await fetch(`/api/dm/messages?channel_id=${currentPrivateChannel}`);
        if (!res.ok) return;

        const data = await res.json();
        const box = document.getElementById('messages');
        box.innerHTML = "";

        data.forEach(msg => {
            const div = document.createElement('div');
            div.className = 'message';
            const date = new Date(msg.created_at).toLocaleString('pt-BR');
            const color = getColorFromName(msg.sender);

            div.innerHTML = `
                <div class="message-header">
                    <span class="username" style="color:${color}">${escapeHTML(msg.sender)}</span>
                    <span class="timestamp">${date}</span>
                </div>
                <div>${highlightMentions(msg.message)}</div>
            `;
            box.appendChild(div);
        });

        box.scrollTop = box.scrollHeight;
    } catch {}
}

/* MENSAGENS */
async function loadMessages() {
    if (currentPrivateChannel) {
        loadPrivateMessages();
        return;
    }

    try {
        const res = await fetch('/api/messages');
        if (!res.ok) return;

        const data = await res.json();
        const visible = data.filter(canUserSeeMessage);

        if (visible.length) {
            const last = visible.at(-1);
            if (lastMessageId && last.id !== lastMessageId) {
                const mentioned = last.content?.includes("@" + loggedUser);
                if (last.name !== loggedUser || mentioned) {
                    document.getElementById("messageSound")?.play();
                }
            }
            lastMessageId = last.id;
        }

        const box = document.getElementById('messages');
        box.innerHTML = "";

        visible.forEach(msg => {
            const div = document.createElement('div');
            div.className = 'message' + (msg.to ? ' whisper' : '');
            const date = new Date(msg.created_at).toLocaleString('pt-BR');
            const color = getColorFromName(msg.name);

            const content = msg.image_url
                ? `<a href="${msg.image_url}" target="_blank">🖼 Imagem</a>`
                : highlightMentions(msg.content);

            div.innerHTML = `
                <div class="message-header">
                    <span class="username" style="color:${color}">${escapeHTML(msg.name)}</span>
                    <span class="timestamp">${date}</span>
                </div>
                <div>${msg.to ? `<strong>Sussurro:</strong> ${content}` : content}</div>
            `;
            box.appendChild(div);
        });

        box.scrollTop = box.scrollHeight;
    } catch (e) {
        console.error(e);
    }
}

/* ✉️ ENVIO */
async function sendMessage() {
    if (isSending) return;

    const input = document.getElementById("content");
    let text = input.value.trim();
    if (!text) return;

    isSending = true;

    try {

        if (text.startsWith("/c ")) {
            const match = text.match(/^\/c\s+@(\w+)/);
            if (!match) return;

            const target = match[1];

            const res = await fetch("/api/dm/create", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ from: loggedUser, to: target })
            });

            const data = await res.json();
            if (data.success) {
                currentPrivateChannel = data.channel.id;
                currentPrivateUser = target;
                showOverlay(`Você iniciou conversa com @${target}`);
            }

            input.value = "";
            loadMessages();
            return;
        }

        if (text.startsWith("/entrar ")) {
            const match = text.match(/^\/entrar\s+@(\w+)/);
            if (!match) return;

            const target = match[1];

            const res = await fetch("/api/dm/create", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ from: loggedUser, to: target })
            });

            const data = await res.json();
            if (data.success) {
                currentPrivateChannel = data.channel.id;
                currentPrivateUser = target;
                showOverlay(`Você entrou na conversa com @${target}`);
            }

            input.value = "";
            loadMessages();
            return;
        }

        if (text === "/sair") {
            currentPrivateChannel = null;
            currentPrivateUser = null;
            showOverlay("Você saiu da conversa privada");
            input.value = "";
            loadMessages();
            return;
        }

        let to = null;
        if (text.startsWith("/s ")) {
            const match = text.match(/^\/s\s+@(\w+)\s+(.+)/);
            if (!match) return;
            to = match[1];
            text = match[2];
            showOverlay(`Sussurro enviado para @${to}`);
        }

        await fetch("/api/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                name: loggedUser,
                content: text,
                to
            })
        });

        input.value = "";
        loadMessages();

    } finally {
        isSending = false;
    }
}
</body>
</html>

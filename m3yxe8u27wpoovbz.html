<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="favicon.png" type="image/png">
  <script>
    if (!sessionStorage.getItem("token") || !sessionStorage.getItem("loggedUser")) {
      window.location.href = "index.html";
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página inicial - Workday</title>

  <style>
    * { box-sizing: border-box; }

    html { scrollbar-width: thin; scrollbar-color: #2c2f36 #0b0f14; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0b0f14; }
    ::-webkit-scrollbar-thumb { background: #2c2f36; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3d46; }

    .messages::-webkit-scrollbar { width: 8px; }
    .messages::-webkit-scrollbar-track { background: #10151c; }
    .messages::-webkit-scrollbar-thumb { background: #2c2f36; border-radius: 6px; }
    .messages::-webkit-scrollbar-thumb:hover { background: #3a3d46; }

    body {
      margin: 0;
      background: #0b0f14;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      color: #e6edf3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 10px;
    }

    .online-box {
      position: fixed;
      top: 10px;
      left: 10px;
      background: #151a21;
      border: 1px solid rgba(255,255,255,.08);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
      color: #b8bcc4;
      box-shadow: 0 6px 18px rgba(0,0,0,.5);
      z-index: 1000;
    }

    .container {
      width: 700px;
      max-width: 100%;
      height: 700px;
      max-height: 90vh;
      background: #151a21;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,.7);
    }

    .header {
      padding: 16px;
      font-size: 15px;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #e6edf3;
    }

    .header-left { display:flex; flex-direction:column; gap:4px; }
    .warning-text { color: #ffffff; }

    #typingStatus {
      font-size: 12px;
      font-weight: 500;
      color: #8b949e;
      min-height: 14px;
    }

    .admin-link {
      text-decoration: none;
      font-size: 14px;
      opacity: 0.8;
      color: #b8bcc4;
      transition: all 0.2s ease;
    }
    .admin-link:hover { opacity: 1; transform: scale(1.05); }

    .messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #10151c;
    }

    .message {
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 10px;
      background: #151a21;
      border: 1px solid rgba(255,255,255,.08);
      font-size: 13px;
      transition: background 0.2s ease, transform 0.15s ease, border-color 0.2s ease;
      cursor: pointer;
    }
    .message:hover { background: #1b2028; transform: translateY(-1px); }
    .message.selected-reply { border-color: rgba(88,166,255,0.8); box-shadow: 0 0 0 1px rgba(88,166,255,0.18); }

    .message-header { display:flex; justify-content:space-between; margin-bottom:4px; }
    .username { font-weight:600; color:#ffffff; }
    .timestamp { font-size:11px; color:#8b949e; }

    .form {
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,.08);
      display: flex;
      gap: 8px;
      align-items: center;
      position: relative;
      flex-wrap: wrap;
    }

    .reply-bar {
      width: 100%;
      display: none;
      background: #10151c;
      border: 1px solid rgba(255,255,255,.10);
      border-left: 3px solid rgba(88,166,255,0.85);
      border-radius: 10px;
      padding: 10px 10px;
      margin-bottom: 8px;
      color: #e6edf3;
      box-shadow: 0 6px 18px rgba(0,0,0,.35);
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .reply-bar .reply-text {
      font-size: 12px;
      color: #c9d1d9;
      line-height: 1.25;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      max-width: 85%;
    }
    .reply-bar .reply-text strong { color:#ffffff; }
    .reply-bar button {
      background: transparent;
      border: 1px solid rgba(255,255,255,.14);
      color: #ffffff;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      transition: all .2s ease;
      font-size: 12px;
    }
    .reply-bar button:hover { background: rgba(255,255,255,.06); transform: translateY(-1px); }

    textarea {
      flex: 1;
      resize: none;
      height: 45px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #3a3d46;
      background: #10151c;
      color: #e6edf3;
      font-size: 13px;
      outline: none;
      transition: border 0.2s ease, box-shadow 0.2s ease;
      min-width: 180px;
    }
    textarea:focus { border-color: #3a3d46; box-shadow: 0 0 0 2px rgba(255,255,255,.12); }

    button.send-btn {
      padding: 0 18px;
      height: 45px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.12);
      background: #10151c;
      color: #ffffff;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    button.send-btn:hover { background:#151a21; transform: translateY(-1px); }

    .emoji-toggle { cursor:pointer; font-size:20px; opacity:.75; transition:all .2s ease; }
    .emoji-toggle:hover { opacity:1; transform:scale(1.15); }

    .emoji-panel {
      position: absolute;
      bottom: 65px;
      right: 90px;
      width: 260px;
      max-height: 200px;
      overflow-y: auto;
      background: #151a21;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 12px;
      display: none;
      flex-wrap: wrap;
      gap: 6px;
    }
    .emoji-panel span { cursor:pointer; font-size:20px; transition:transform .1s ease; }
    .emoji-panel span:hover { transform:scale(1.3); }

    .reply-preview {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-left: 3px solid rgba(88,166,255,0.75);
      padding: 8px 10px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #c9d1d9;
    }
    .reply-preview .rp-top { font-weight:700; color:#ffffff; font-size:12px; margin-bottom:4px; }
    .reply-preview .rp-snippet { opacity:.95; }

    #mini-profile {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(21,26,33,0.95);
      color: #ffffff;
      font-size: 14px;
      padding: 6px 12px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,.5);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    #mini-profile span { font-weight:bold; color:#fff; }

    #arrow { transition: transform 0.3s ease; margin-left: 4px; }

    #dropdown-menu {
      display: none;
      position: absolute;
      top: 40px;
      right: 0;
      background: rgba(21,26,33,0.95);
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,.6);
      padding: 8px 12px;
      z-index: 1000;
    }
    #dropdown-menu button {
      background: #10151c;
      color: #ffffff;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      transition: all 0.2s ease;
    }
    #dropdown-menu button:hover { background:#151a21; transform: translateY(-1px); }

    .online-header { display:flex; align-items:center; gap:8px; }
    .online-dot { width:10px; height:10px; background:#3fb950; border-radius:50%; animation:pulse 1.5s infinite; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(63,185,80,0.6); }
      70% { box-shadow: 0 0 0 8px rgba(63,185,80,0); }
      100% { box-shadow: 0 0 0 0 rgba(63,185,80,0); }
    }

    .mention { color:#ffffff; background:#2c2f36; font-weight:700; padding:2px 6px; border-radius:6px; }
    .mention-self { color:#1f2937; background:#e5e7eb; font-weight:700; padding:2px 6px; border-radius:6px; }

    .message.whisper {
      background:#2a2538;
      border:1px solid #6f42c1;
      color:#e5def5;
      font-style:italic;
      box-shadow:0 0 0 1px rgba(111,66,193,0.15);
    }
    .message.whisper:hover { background:#332d46; }

    .message.dm {
      background:#0f1a13;
      border:1px solid rgba(63,185,80,0.35);
      color:#d7ffe6;
    }
    .message.dm:hover { background:#14261b; }

    .overlay {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #10151c;
      color: #ffffff;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.6);
      z-index: 9999;
      transition: opacity 0.4s ease, transform 0.3s ease;
    }
    .overlay.success { background:#151a21; color:#ffffff; }
    .overlay.error { background:#da3633; }
    .overlay.info { background:#2c2c2c; }

    @media (max-width: 768px) {
      .form { flex-direction: column; align-items: stretch; gap: 6px; }
      button.send-btn { width: 100%; }
      .emoji-panel { width: 90%; right: 5%; bottom: 80px; }
    }
  </style>
</head>

<body>
  <div id="mini-profile">
    <span id="user-phone"></span>
    <svg id="arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </div>

  <div id="dropdown-menu">
    <button id="logout">Sair</button>
  </div>

  <audio id="messageSound" src="message.mp3" preload="auto"></audio>

  <div class="online-box">
    <div class="online-header">
      <div class="online-dot"></div>
      <span id="onlineUsers">0</span>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <div class="header-left">
        <span class="warning-text" id="headerTitle">Mensagens com 24 horas de envio serão apagadas todos os dias à meia-noite.</span>
        <span id="typingStatus"></span>
      </div>
      <a href="https://6bh1xntg0kegg8kp.vercel.app/" class="admin-link">🔒</a>
    </div>

    <div class="messages" id="messages"></div>

    <div class="form">
      <div class="reply-bar" id="replyBar">
        <div class="reply-text" id="replyBarText"></div>
        <button type="button" id="cancelReplyBtn">Cancelar</button>
      </div>

      <textarea id="content" placeholder="Escreva uma mensagem... (use CTRL + V para enviar imagens)"></textarea>
      <span class="emoji-toggle" onclick="toggleEmojis()">🙂</span>
      <button class="send-btn" onclick="sendMessage()">Enviar</button>
      <div class="emoji-panel" id="emojiPanel"></div>
    </div>
  </div>

  <script>
    const loggedUser = sessionStorage.getItem("loggedUser");

    // =====================================================
    // 🔔 TITLE BADGE (notificação no title)
    // =====================================================
    const ORIGINAL_TITLE = document.title || "Página inicial - Workday";
    let unreadTitleCount = 0;

    function _updateTitleBadge() {
      document.title = unreadTitleCount > 0
        ? `(${unreadTitleCount}) ${ORIGINAL_TITLE}`
        : ORIGINAL_TITLE;
    }

    function _bumpTitleBadge(n = 1) {
      unreadTitleCount += n;
      if (unreadTitleCount < 0) unreadTitleCount = 0;
      _updateTitleBadge();
    }

    function _clearTitleBadge() {
      unreadTitleCount = 0;
      _updateTitleBadge();
    }

    window.addEventListener("focus", _clearTitleBadge);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) _clearTitleBadge();
    });

    // ====== API PATH (compatibilidade /api/messages vs /api/message) ======
    let _messagesPath = null;
    async function apiPathMessages() {
      if (_messagesPath) return _messagesPath;

      // tenta /api/messages primeiro
      try {
        const r1 = await fetch("/api/messages?ping=1");
        if (r1.ok || r1.status === 405) { _messagesPath = "/api/messages"; return _messagesPath; }
      } catch {}

      // fallback /api/message (seu arquivo original)
      _messagesPath = "/api/message";
      return _messagesPath;
    }

    // ====== Estado geral ======
    let lastMessageId = null; // (som)
    let pendingImageUrl = null;
    let isSending = false;

    let chatMode = "public"; // "public" | "dm"
    let currentRoom = null;
    let currentOther = null;

    // reply
    let replyState = null;
    let lastRenderedElements = [];

    // typing
    let typingDebounceTimer = null;
    let lastTypingSentAt = 0;

    // incremental state
    const incState = {
      public: { lastId: 0, rendered: new Set() },
      dm:     { lastId: 0, rendered: new Set() }
    };

    const userColors = ["#58a6ff","#2ea043","#f0883e","#a371f7","#ff7b72","#1f6feb","#3fb950","#d29922","#bc8cff","#ffa657"];

    function getColorFromName(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      return userColors[Math.abs(hash) % userColors.length];
    }

    function escapeHTML(str) {
      return String(str || "").replace(/[&<>"']/g, match => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
      }[match]));
    }

    function highlightMentions(text) {
      const escaped = escapeHTML(text);
      return escaped.replace(/@(\w+)/g, (match, username) => {
        if (username === loggedUser) return `<span class="mention-self">@${username}</span>`;
        return `<span class="mention">@${username}</span>`;
      });
    }

    function canUserSeeMessage(msg) {
      if (!msg.to) return true;
      return msg.to === loggedUser || msg.name === loggedUser;
    }

    function showOverlay(msg, type = "info") {
      const overlay = document.createElement("div");
      overlay.className = `overlay ${type}`;
      overlay.textContent = msg;
      document.body.appendChild(overlay);
      setTimeout(() => {
        overlay.style.opacity = "0";
        setTimeout(() => overlay.remove(), 400);
      }, 2200);
    }

    function setHeader() {
      const el = document.getElementById("headerTitle");
      if (chatMode === "dm" && currentRoom) {
        el.textContent = `🔐 Sala privada: ${currentRoom} (com @${currentOther}) — use /sair para voltar ao público`;
      } else {
        el.textContent = "Mensagens com 24 horas de envio serão apagadas todos os dias à meia-noite.";
      }
    }

    // ====== Emoji ======
    function toggleEmojis() {
      const panel = document.getElementById("emojiPanel");
      panel.style.display = panel.style.display === "flex" ? "none" : "flex";
    }

    const emojis = ["😀","😁","😂","🤣","😃","😄","😅","😆","😉","😊","😍","🥰","😘","😎","🤔","😢","😭","😡","🔥","👍","👎","👏","🙌","💪","🎉","❤️","💔","💯","✔️","⚡"];
    function loadEmojis() {
      const panel = document.getElementById("emojiPanel");
      panel.innerHTML = "";
      emojis.forEach(emoji => {
        const span = document.createElement("span");
        span.textContent = emoji;
        span.onclick = () => {
          const textarea = document.getElementById("content");
          textarea.value += emoji;
          textarea.focus();
          onUserTyping();
        };
        panel.appendChild(span);
      });
    }
    loadEmojis();

    // ====== Reply UI ======
    function renderReplyBar() {
      const bar = document.getElementById("replyBar");
      const txt = document.getElementById("replyBarText");

      if (!replyState || !replyState.preview) {
        bar.style.display = "none";
        txt.textContent = "";
        return;
      }

      const p = replyState.preview;
      const when = p.created_at ? new Date(p.created_at).toLocaleString('pt-BR') : "";
      txt.innerHTML = `<strong>Respondendo a @${escapeHTML(p.name || "")}</strong> — ${escapeHTML(p.snippet || "")}${when ? ` <span style="opacity:.75">(${when})</span>` : ""}`;
      bar.style.display = "flex";
    }

    function clearReplySelection() {
      replyState = null;
      renderReplyBar();
      lastRenderedElements.forEach(el => el.classList.remove("selected-reply"));
    }

    function setReplyFromMessage(msg, element) {
      if (!msg || !msg.id) return;

      const text = (msg.content || msg.message || "").trim();
      const hasImage = !!msg.image_url;
      const snippet = text
        ? (text.length > 80 ? text.slice(0, 80) + "…" : text)
        : (hasImage ? "🖼 Imagem" : "");

      const author = msg.name || msg.sender || "Desconhecido";
      const createdAt = msg.created_at || null;

      replyState = {
        id: msg.id,
        preview: {
          id: msg.id,
          name: author,
          snippet,
          hasImage,
          created_at: createdAt
        }
      };

      lastRenderedElements.forEach(el => el.classList.remove("selected-reply"));
      if (element) element.classList.add("selected-reply");

      renderReplyBar();
      showOverlay(`Respondendo @${author}`, "info");
      document.getElementById("content").focus();
    }

    document.getElementById("cancelReplyBtn").addEventListener("click", () => {
      clearReplySelection();
      showOverlay("Reply cancelado.", "info");
    });

    function buildReplyPreviewHTML(preview) {
      if (!preview || typeof preview !== "object") return "";
      const name = preview.name || "";
      const snippet = preview.snippet || "";
      return `
        <div class="reply-preview">
          <div class="rp-top">↩️ Respondendo a @${escapeHTML(name)}</div>
          <div class="rp-snippet">${highlightMentions(snippet)}</div>
        </div>
      `;
    }

    // ====== Upload imagem ======
    document.addEventListener("DOMContentLoaded", () => {
      const contentInput = document.getElementById("content");
      if (!contentInput) return;

      contentInput.addEventListener("paste", async (event) => {
        const items = event.clipboardData?.items;
        if (!items) return;

        for (let item of items) {
          if (item.type && item.type.includes("image")) {
            const file = item.getAsFile();
            if (file) {
              event.preventDefault();
              await uploadImage(file);
            }
          }
        }
      });
    });

    async function uploadImage(file) {
      const fileName = `${Date.now()}-${file.name}`;
      const formData = new FormData();
      formData.append("file", file);
      formData.append("fileName", fileName);

      try {
        const res = await fetch("/api/upload", { method: "POST", body: formData });
        const data = await res.json();

        if (data.url) {
          pendingImageUrl = data.url;
          const textarea = document.getElementById("content");
          textarea.value += (textarea.value.trim() ? "\n" : "") + "🖼 [Imagem pronta para envio]";
          textarea.focus();
          showOverlay("Imagem pronta para envio ✅", "success");
          onUserTyping();
        } else {
          showOverlay("Falha no upload da imagem ❌", "error");
        }
      } catch {
        showOverlay("Falha no upload da imagem ❌", "error");
      }
    }

    // ====== Comandos ======
    function parseWhisper(text) {
      if (text.startsWith("/s ")) {
        const match = text.match(/^\/s\s+@(\w+)\s+(.+)$/);
        if (match) return { to: match[1], content: match[2] };
      }
      return { to: null, content: text };
    }

    function normalizeRoomName(roomRaw) {
      let room = (roomRaw || "").trim();
      room = room.replace(/\s+/g, "-");
      room = room.replace(/[^A-Za-z0-9_-]/g, "");
      room = room.slice(0, 32);
      return room;
    }

    function parseCreateRoom(text) {
      const match = text.match(/^\/c\s+@(\w+)\s+(.+)$/);
      if (!match) return null;

      const target = match[1];
      const roomRaw = match[2];
      const room = normalizeRoomName(roomRaw);

      if (!room || room.length < 3) return { target, room: null, roomRaw };
      return { target, room, roomRaw };
    }

    function parseEnterRoom(text) {
      const match = text.match(/^\/entrar\s+(.+)$/);
      if (!match) return null;

      const roomRaw = match[1];
      const room = normalizeRoomName(roomRaw);

      if (!room || room.length < 3) return { room: null, roomRaw };
      return { room, roomRaw };
    }

    function isLeaveCommand(text) {
      return /^\/sair\s*$/.test(text);
    }

    // ====== Typing ======
    async function sendTyping(isTyping) {
      if (!loggedUser) return true;

      const now = Date.now();
      if (isTyping && now - lastTypingSentAt < 800) return true;
      lastTypingSentAt = now;

      const room = (chatMode === "dm" && currentRoom) ? currentRoom : null;

      try {
        await fetch("/api/online", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: loggedUser, typing: !!isTyping, room })
        });
        return true;
      } catch {
        return false;
      }
    }

    function onUserTyping() {
      const input = document.getElementById("content");
      const hasText = input && input.value.trim().length > 0;
      const isFocused = document.activeElement === input;

      if (hasText && isFocused) {
        clearTimeout(typingDebounceTimer);
        typingDebounceTimer = setTimeout(() => sendTyping(true), 120);
        return;
      }
      sendTyping(false);
    }

    function clearTypingUI() {
      const el = document.getElementById("typingStatus");
      if (el) el.textContent = "";
    }

    function setTypingUI(names) {
      const el = document.getElementById("typingStatus");
      if (!el) return;

      if (!names || !names.length) { el.textContent = ""; return; }
      if (names.length === 1) { el.textContent = `${names[0]} está digitando...`; return; }
      if (names.length === 2) { el.textContent = `${names[0]} e ${names[1]} estão digitando...`; return; }
      el.textContent = `${names.slice(0, 3).join(", ")} estão digitando...`;
    }

    async function loadTypingStatus() {
      try {
        const res = await fetch("/api/online");
        const data = await res.json();
        const users = Array.isArray(data) ? data : [];
        const now = Date.now();

        const typingUsers = users.filter(u => {
          if (!u || !u.name) return false;
          if (u.name === loggedUser) return false;
          if (!u.typing) return false;
          if (!u.last_typing) return false;

          const last = new Date(u.last_typing).getTime();
          if (now - last > 7000) return false;

          if (chatMode === "dm" && currentRoom) return u.typing_room === currentRoom;
          return !u.typing_room;
        });

        setTypingUI(typingUsers.map(u => u.name));
        return true;
      } catch {
        clearTypingUI();
        return false;
      }
    }

    // ====== Render: FULL replace ======
    function renderReplacePublic(messages, options = {}) {
      const { forceScrollBottom = false } = options;

      const box = document.getElementById("messages");
      const prevTop = box.scrollTop;
      const prevH = box.scrollHeight;
      const distBottom = prevH - prevTop - box.clientHeight;
      const shouldAutoScroll = forceScrollBottom || distBottom < 80;

      box.innerHTML = "";
      lastRenderedElements = [];

      messages.forEach(msg => {
        const isWhisper = msg.to !== null;

        const div = document.createElement("div");
        div.className = "message" + (isWhisper ? " whisper" : "");

        const date = new Date(msg.created_at).toLocaleString("pt-BR");
        const color = getColorFromName(msg.name);

        const contentHTML = msg.image_url
          ? `<a href="${escapeHTML(msg.image_url)}" target="_blank" style="color:#58a6ff">🖼 Imagem</a>`
          : highlightMentions(msg.content);

        const replyHTML = buildReplyPreviewHTML(msg.reply_preview);

        div.innerHTML = `
          <div class="message-header">
            <span class="username" style="color:${color}">${escapeHTML(msg.name)}</span>
            <span class="timestamp">${date}</span>
          </div>
          ${replyHTML}
          <div>${isWhisper ? `<strong>Sussurro:</strong> ${contentHTML}` : contentHTML}</div>
        `;

        div.addEventListener("click", () => setReplyFromMessage(msg, div));

        box.appendChild(div);
        lastRenderedElements.push(div);
      });

      if (shouldAutoScroll) {
        box.scrollTop = box.scrollHeight;
      } else {
        const diff = box.scrollHeight - prevH;
        box.scrollTop = prevTop + diff;
      }
    }

    // ====== Render: APPEND incremental ======
    function appendPublic(newMsgs) {
      if (!newMsgs.length) return;

      const box = document.getElementById("messages");
      const prevTop = box.scrollTop;
      const prevH = box.scrollHeight;
      const distBottom = prevH - prevTop - box.clientHeight;
      const shouldAutoScroll = distBottom < 80;

      newMsgs.forEach(msg => {
        const isWhisper = msg.to !== null;

        const div = document.createElement("div");
        div.className = "message" + (isWhisper ? " whisper" : "");

        const date = new Date(msg.created_at).toLocaleString("pt-BR");
        const color = getColorFromName(msg.name);

        const contentHTML = msg.image_url
          ? `<a href="${escapeHTML(msg.image_url)}" target="_blank" style="color:#58a6ff">🖼 Imagem</a>`
          : highlightMentions(msg.content);

        const replyHTML = buildReplyPreviewHTML(msg.reply_preview);

          </div>
          ${replyHTML}
          <div>${isWhisper ? `<strong>Sussurro:</strong> ${contentHTML}` : contentHTML}</div>
        `;

        div.addEventListener("click", () => setReplyFromMessage(msg, div));

        box.appendChild(div);
        lastRenderedElements.push(div);
      });

      if (shouldAutoScroll) {
        box.scrollTop = box.scrollHeight;
      } else {
        const diff = box.scrollHeight - prevH;
        box.scrollTop = prevTop + diff;
      }
    }

    // ====== FETCH helpers ======
    function maxIdFrom(list) {
      let max = 0;
      for (const m of list) {
        const id = Number(m?.id || 0);
        if (id > max) max = id;
      }
      return max;
    }

    function playSoundIfNeeded(lastMsg) {
      if (!lastMsg) return;
      const name = lastMsg.name || lastMsg.sender || "";
      const content = (lastMsg.content || lastMsg.message || "");
      const mentioned = content.includes("@" + loggedUser);
      if (name !== loggedUser || mentioned) {
        try { document.getElementById("messageSound").play(); } catch {}
      }
    }

    // ====== LOAD: public (full + incremental) ======
    async function loadPublicFull(options = {}) {
      const base = await apiPathMessages();
      const limit = 200;

      const url = `${base}?recent=1&limit=${limit}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("fail");
      const data = await res.json();

      const visible = Array.isArray(data) ? data.filter(canUserSeeMessage) : [];
      renderReplacePublic(visible, options);

      incState.public.rendered.clear();
      visible.forEach(m => incState.public.rendered.add(Number(m.id)));
      incState.public.lastId = maxIdFrom(visible);

      const last = visible[visible.length - 1];
      if (last && lastMessageId && last.id !== lastMessageId) playSoundIfNeeded(last);
      if (last) lastMessageId = last.id;

      return true;
    }

    async function loadPublicIncremental() {
      const base = await apiPathMessages();
      const afterId = incState.public.lastId || 0;
      const url = `${base}?after_id=${afterId}&limit=200`;

      const res = await fetch(url);
      if (!res.ok) throw new Error("fail");
      const data = await res.json();

      const list = Array.isArray(data) ? data.filter(canUserSeeMessage) : [];
      if (!list.length) return true;

      const newOnes = [];
      for (const m of list) {
        const id = Number(m.id);
        if (!incState.public.rendered.has(id)) {
          incState.public.rendered.add(id);
          newOnes.push(m);
        }
      }

      if (!newOnes.length) return true;

      // 🔔 TITLE BADGE: só conta em background e só mensagens de outros
      if (document.hidden) {
        const inc = newOnes.filter(m => (m?.name || "") !== loggedUser).length;
        if (inc > 0) _bumpTitleBadge(inc);
      }

      appendPublic(newOnes);

      const last = newOnes[newOnes.length - 1];
      if (last && lastMessageId && last.id !== lastMessageId) playSoundIfNeeded(last);
      if (last) lastMessageId = last.id;

      const maxNew = maxIdFrom(newOnes);
      if (maxNew > incState.public.lastId) incState.public.lastId = maxNew;

      return true;
    }

    // ====== LOAD: dm (full + incremental) ======
    async function loadDmFull(options = {}) {
      if (!currentRoom) return true;
      const limit = 200;
      const url = `/api/dm/messages?room=${encodeURIComponent(currentRoom)}&name=${encodeURIComponent(loggedUser)}&recent=1&limit=${limit}`;

      const res = await fetch(url);
      if (!res.ok) throw new Error("fail");
      const data = await res.json();

      const msgs = Array.isArray(data) ? data : [];
      renderReplaceDm(msgs, options);

      incState.dm.rendered.clear();
      msgs.forEach(m => incState.dm.rendered.add(Number(m.id)));
      incState.dm.lastId = maxIdFrom(msgs);

      return true;
    }

    async function loadDmIncremental() {
      if (!currentRoom) return true;
      const afterId = incState.dm.lastId || 0;
      const url = `/api/dm/messages?room=${encodeURIComponent(currentRoom)}&name=${encodeURIComponent(loggedUser)}&after_id=${after_id=${afterId}}&limit=200`;
    }
  </script>
